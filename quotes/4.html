<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="../elements/img/favicon.png" type="image/png"/>
  <title>James Said... | JamesIsALiberal.com</title>

  <meta property="og:title" content="James Said..."/>
  <meta property="og:description" content="&quot;I love Trevor's toes&quot; — James, 7/21/26"/>
  <meta property="og:url" content="https://jamesisaliberal.com/quotes/4.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="James is a Liberal"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="James Said..."/>
  <meta name="twitter:description" content="&quot;I love Trevor's toes&quot; — James, 7/21/26"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@1,500;1,600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #d62828;
      --blue: #1d3557;
      --cream: #f1ede4;
      --gold: #e9c46a;
      --dark: #0b1120;
    }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--blue);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(214,40,40,0.25), transparent),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(233,196,106,0.2), transparent);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .site-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(233,196,106,0.3);
      border-radius: 999px;
      padding: 0.3rem 1rem;
      margin-bottom: 2rem;
    }
    .quote-text {
      font-family: 'Lora', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      color: #fff;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .quote-attr {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn-gold {
      background: var(--gold);
      color: var(--dark);
    }
    .btn-gold:hover { box-shadow: 0 4px 20px rgba(233,196,106,0.4); }
    .btn-outline {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.18); }
    .btn svg { width: 16px; height: 16px; }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gold);
      color: var(--dark);
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 600px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="site-badge">JamesIsALiberal.com</div>
    <div class="quote-text">"I love Trevor's toes"</div>
    <div class="quote-attr">— James, 7/21/26</div>
    <div class="actions">
      <a href="https://jamesisaliberal.com" class="btn btn-gold">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Visit the Archive
      </a>
      <button class="btn btn-outline" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Link
      </button>
    </div>
  </div>
  <div class="toast" id="toast">Link copied!</div>
  <script>
    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        var t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2000);
      });
    }
  </script>
</body>
</html>
